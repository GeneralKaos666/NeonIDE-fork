name: Build and Release APK

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      releasetag:
        description: Enter the tag name
        type: string
      buildType:
        description: "debug or release"
        required: true
        type: choice
        options:
          - debug
          - release
        default: debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: |
          sed -i '/android.aapt2FromMavenOverride=/d' gradle.properties

          if [ "${{ github.event.inputs.buildType }}" = "release" ]; then
            ./gradlew assembleRelease \
              -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
              -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          else
            ./gradlew assembleDebug
          fi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release'
        uses: softprops/action-gh-release@v3
        with:
          name: NeonIDE ${{ inputs.releasetag }}
          tag_name: ${{ inputs.releasetag }}
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.inputs.buildType }}-apk
          path: app/build/outputs/apk/${{ github.event.inputs.buildType }}/*.apk
          retention-days: 7
