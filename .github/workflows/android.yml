name: Build and Release APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      releasetag:
        description: Enter the tag name
        type: string
      buildType:
        description: "debug or release"
        required: true
        type: choice
        options:
          - debug
          - release
        default: debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # NEW STEP: Decode the base64-encoded keystore from secrets into a binary file
      - name: Decode Keystore File
        if: github.event.inputs.buildType == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build APK
        run: |
          sed -i '/android.aapt2FromMavenOverride=/d' gradle.properties

          if [ "${{ github.event.inputs.buildType }}" = "release" ]; then
            # Modified to include keystore location and alias configurations via project properties
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="${{ github.workspace }}/app/release.keystore" \
              -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
          else
            ./gradlew assembleDebug
          fi

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release'
        uses: softprops/action-gh-release@v2
        with:
          name: NeonIDE ${{ inputs.releasetag }}
          tag_name: ${{ inputs.releasetag }}
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.buildType }}-apk
          path: app/build/outputs/apk/${{ github.event.inputs.buildType }}/*.apk
          retention-days: 7
